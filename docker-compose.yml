services:
  s3:
    image: localstack/localstack:4.14-arm64
    environment:
      - SERVICES=s3
      - USE_SSL=false
      - EXTRA_CORS_ALLOWED_ORIGINS=*
      - DISABLE_CORS_CHECKS=1
      - EXTRA_CORS_ALLOWED_HEADERS=*
    ports:
      - '4566:4566'
    volumes:
      - ./localstack/files:/localstack_from_host_machine
      - ./localstack/setup:/etc/localstack/init/ready.d