name: CI Verify

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  verify-cli:
    name: Verify CLI package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: cli/package-lock.json

      - name: Install CLI dependencies
        working-directory: ./cli
        run: npm ci

      - name: Typecheck (CLI)
        working-directory: ./cli
        run: npm run typecheck

      - name: Run CLI tests
        working-directory: ./cli
        run: npm test -- --run

  verify-root:
    name: Verify root package (Angular app)
    runs-on: ubuntu-latest
    needs: verify-cli
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Build Angular app (for CLI)
        run: npm run build:cli

      - name: Run unit tests (Angular)
        run: npx ng test --watch=false
